name: Refresh current projects

# Regenerates data/current-projects.js from projects.html + ClickUp once a week
# (and on demand). Add repo secrets CLICKUP_API_TOKEN and CLICKUP_LIST_ID to pull
# from ClickUp; without them it just rebuilds from the local projects.

on:
  schedule:
    - cron: '0 13 * * 1'   # Mondays 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build current projects
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
        run: python3 scripts/build_projects.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current-projects.js
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh current projects (weekly)"
            git push
          fi
      - name: Trigger Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X POST repos/${{ github.repository }}/pages/builds || true
